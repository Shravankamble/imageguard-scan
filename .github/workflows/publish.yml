name: imageguard-scan testing composite action
on: 
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout repository
      uses: actions/checkout@v4

    - name: Run the imageguard-scan action
      uses: Shravankamble/imageguard-scan@v1
      with:
        image: nginx:latest
        path: imageguard-scan-resources
        token: ${{ secrets.IMAGEGUARD_TOKEN }}